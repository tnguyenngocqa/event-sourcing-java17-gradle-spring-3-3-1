server:
  port: 9004

management:
  endpoints:
    web:
      exposure:
        include: "*"

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}

spring:
  application:
    name: borrowingservice
  h2:
    console:
      enabled: true
      path: /h2-console # Console will be available at http://localhost:8080/h2-console
  datasource:
    url: jdbc:h2:mem:browringDB # In-memory database named 'bookDB'
    driver-class-name: org.h2.Driver
    username: sa
    password:  # Default username is 'sa', password can be left blank
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create # Automatically creates/updates tables based on entities
#    show-sql: true

